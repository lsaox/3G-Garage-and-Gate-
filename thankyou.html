<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | 3G Garage & Gate Services</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gold: "#f4bf17",
            purple: "#6d28d9",
            ink: "#050505"
          },
          fontFamily: {
            orbitron: ["Orbitron", "sans-serif"],
            sans: ["Inter", "system-ui", "sans-serif"]
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body {
      background: #050505;
      color: white;
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
    }

    .diamond-btn {
      display: inline-block;
      transform: skewX(-14deg);
    }

    .diamond-btn span {
      display: block;
      transform: skewX(14deg);
    }
  </style>
</head>
<body>

  <section class="min-h-screen flex items-center justify-center px-6">
    <div class="max-w-3xl mx-auto text-center">

      <p class="font-orbitron uppercase tracking-[0.28em] text-purple text-sm mb-5">
        Thank You
      </p>

      <h1 class="font-orbitron text-4xl sm:text-5xl md:text-7xl font-black leading-[0.92]">
        Your Message
        <span class="text-gold block">Has Been Sent.</span>
      </h1>

      <p class="mt-6 max-w-2xl mx-auto text-white/72 text-base md:text-lg leading-relaxed">
        We received your request and will get back to you as soon as possible.
      </p>

      <div class="mt-10">
        <a href="index.html"
           class="diamond-btn bg-gold text-black font-orbitron uppercase tracking-[0.16em] px-10 py-5 hover:scale-105 transition duration-300 hover:shadow-[0_0_35px_rgba(244,191,23,0.45)]">
          <span>Back To Home</span>
        </a>
      </div>

    </div>
  </section>

</body>
</html>
